name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "ubuntu-gcc",   os: ubuntu-latest,  cmake_extra: "-DCMAKE_CXX_COMPILER=g++" }
          - { name: "ubuntu-clang", os: ubuntu-latest,  cmake_extra: "-DCMAKE_CXX_COMPILER=clang++" }
          - { name: "windows-msvc", os: windows-latest, cmake_extra: "" }
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  sanitize:
    name: sanitize (clang asan+ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_COMPILER=clang++ -DMANGLY_SANITIZE=all
      - name: Build
        run: cmake --build build
      - name: Test
        env:
          # Fail on any leak/UB; keep the stress case short so CI stays fast.
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          MANGLY_STRESS_PASSES: "200"
        run: ctest --test-dir build --output-on-failure

  package:
    name: package cli
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: mangly-cli
          path: build/mangly
